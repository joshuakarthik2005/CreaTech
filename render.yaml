services:
  - type: web
    name: formkit_optimizer_api
    runtime: python
    rootDir: formkit-optimizer
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: PYTHONPATH
        value: "."
